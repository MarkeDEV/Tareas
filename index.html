<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tareas del Grupo</title>
  <style>
    @font-face {
      font-family: 'CascadiaCode';
      src: url('https://cdn.jsdelivr.net/gh/microsoft/cascadia-code@v2111.01/ttf/CascadiaCode.ttf') format('truetype');
      font-weight: 400 700;
    }
    :root {
      --bg: #ede8f5;
      --surface: #f7f4fc;
      --border: #d8cff0;
      --accent: #7c4dcc;
      --warn: #e07b00;
      --danger: #d93025;
      --text: #2a1f3d;
      --muted: #7a6a99;
      --card: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'CascadiaCode', monospace; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(circle at 20% 20%, rgba(124,77,204,0.08) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(156,109,224,0.08) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    .wrap { max-width: 680px; margin: 0 auto; padding: 16px 16px 60px; position: relative; z-index: 1; }

    .header { margin-bottom: 24px; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .label { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); }
    .live { font-size: 11px; color: var(--accent); }
    h1 { font-size: clamp(32px, 8vw, 44px); font-weight: 700; color: var(--text); line-height: 1.1; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 13px; }

    .dots-wrap { position: relative; display: flex; align-items: center; gap: 8px; }
    .dots-btn {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      color: var(--accent); font-size: 20px; width: 42px; height: 42px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-family: 'CascadiaCode', monospace;
    }
    .dots-menu {
      display: none; position: absolute; top: 48px; right: 0;
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      box-shadow: 0 8px 24px rgba(124,77,204,0.15); z-index: 100; min-width: 220px; overflow: hidden;
    }
    .dots-menu.open { display: block; }
    .dots-item { padding: 14px 18px; font-size: 13px; cursor: pointer; color: var(--text); border-bottom: 1px solid var(--border); font-family: 'CascadiaCode', monospace; }
    .dots-item:last-child { border-bottom: none; }
    .dots-item:hover { background: var(--bg); color: var(--accent); }
    .dots-item.ok { color: green; }

    .stats { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; box-shadow: 0 1px 4px rgba(124,77,204,0.08); }
    .stat strong { color: var(--text); font-size: 18px; }

    .task-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 18px; margin-bottom: 12px; position: relative;
      box-shadow: 0 2px 8px rgba(124,77,204,0.07); animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    .card-actions { position: absolute; top: 14px; right: 14px; display: flex; gap: 6px; }
    .icon-btn { background: none; border: 1px solid var(--border); border-radius: 7px; color: var(--muted); cursor: pointer; font-size: 13px; padding: 4px 9px; font-family: 'CascadiaCode', monospace; }
    .icon-btn.edit:hover { border-color: var(--warn); color: var(--warn); background: #fff8ee; }
    .icon-btn.del:hover { border-color: var(--danger); color: var(--danger); background: #fff0f0; }
    .card-num { font-size: 13px; font-weight: 700; color: #9a85c0; margin-bottom: 8px; letter-spacing: 3px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:4px; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 10px; }
    .card-title { font-size: 16px; font-weight: 700; color: var(--text); padding-right: 0px; margin-bottom: 6px; line-height: 1.3; clear:both; }
    .card-desc { font-size: 13px; color: #8a7aaa; line-height: 1.6; margin-bottom: 12px; }
    .card-meta { display: flex; gap: 16px; font-size: 12px; color: var(--muted); flex-wrap: wrap; align-items: center; }
    .days-left { margin-left: auto; font-weight: 600; font-size: 12px; }

    .empty { text-align: center; padding: 60px 20px; color: #c0b0d8; font-size: 13px; letter-spacing: 1px; }
    .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }

    .admin-toggle { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px; color: var(--muted); font-size: 13px; cursor: pointer; width: 100%; margin-bottom: 8px; font-family: 'CascadiaCode', monospace; text-align: left; }
    .admin-toggle:hover { border-color: var(--accent); color: var(--accent); }

    .panel { background: var(--card); border: 1px solid var(--accent); border-radius: 14px; padding: 20px; margin-bottom: 12px; display: none; }
    .panel.open { display: block; }
    .panel-label { font-size: 10px; letter-spacing: 3px; color: var(--accent); margin-bottom: 16px; }

    .form-grid { display: flex; flex-direction: column; gap: 10px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .field label { display: block; font-size: 10px; letter-spacing: 2px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
    .inp { background: var(--bg); border: 1px solid var(--border); border-radius: 9px; color: var(--text); padding: 10px 13px; font-size: 14px; width: 100%; outline: none; font-family: 'CascadiaCode', monospace; }
    .inp:focus { border-color: var(--accent); }
    textarea.inp { resize: vertical; }

    /* Rich text toolbar */
    .toolbar { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; align-items: center; }
    .tb-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; font-family: 'CascadiaCode', monospace; color: var(--text); }
    .tb-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tb-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .color-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; display: inline-block; }
    .color-dot.selected { border-color: var(--text); }
    .rich-area { background: var(--bg); border: 1px solid var(--border); border-radius: 9px; color: var(--text); padding: 10px 13px; font-size: 14px; width: 100%; outline: none; font-family: 'CascadiaCode', monospace; min-height: 80px; }
    .rich-area:focus { border-color: var(--accent); }

    /* Card color picker */
    .color-picker-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .card-color-opt { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: border-color 0.15s; }
    .card-color-opt.selected { border-color: var(--text); }

    .btn { border: none; border-radius: 9px; padding: 11px 20px; font-size: 13px; font-family: 'CascadiaCode', monospace; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: #e8e0f0; color: var(--muted); }
    .btn-warn { background: var(--warn); color: #fff; }
    .btn-row { display: flex; gap: 10px; }

    .ai-preview { background: var(--bg); border: 1px solid var(--border); border-radius: 9px; padding: 12px; font-size: 13px; line-height: 1.8; color: var(--text); margin-bottom: 10px; }

    .edit-card { background: var(--card); border: 1px dashed var(--warn); border-radius: 14px; padding: 18px; margin-bottom: 12px; animation: fadeIn 0.2s ease; }
    .edit-label { font-size: 10px; letter-spacing: 3px; color: var(--warn); margin-bottom: 14px; }

    .pin-wrap { display: flex; gap: 8px; margin-bottom: 12px; }
    .pin-wrap .inp { flex: 1; }

    .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 12px; color: var(--accent); font-family: 'CascadiaCode', monospace; font-size: 13px; letter-spacing: 2px; }
    .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-full { width: 100%; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div id="loginModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:white;border-radius:16px;padding:32px;width:90%;max-width:360px;text-align:center;">
    <h2 style="margin-bottom:8px;">👋 Bienvenido</h2>
    <p style="color:#888;margin-bottom:20px;">¿Cuál es tu nombre?</p>
    <input id="loginInput" type="text" placeholder="Tu nombre..." style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px;margin-bottom:16px;box-sizing:border-box;" />
    <button onclick="window.doLoginName()" style="width:100%;padding:12px;background:#7c3aed;color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;">Entrar</button>
  </div>
</div>

  <div id="app" class="loading"><div class="spinner"></div>CARGANDO</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {

};

const ADMIN_PIN = "marlon@";
const CARD_COLORS = [
  { value: "#d8cff0", label: "Morado" },
  { value: "#c8e6c9", label: "Verde" },
  { value: "#bbdefb", label: "Azul" },
  { value: "#ffecb3", label: "Amarillo" },
  { value: "#ffcdd2", label: "Rojo" },
  { value: "#f8bbd0", label: "Rosa" },
  { value: "#b2ebf2", label: "Cyan" },
  { value: "#ffe0b2", label: "Naranja" },
  { value: "#d7ccc8", label: "Cafe" },
];

const fireApp = initializeApp(firebaseConfig);
const db = getFirestore(fireApp);

let tasks = [];
let adminUnlocked = false;
let editingId = null;
let addOpen = false;
let loginOpen = false;
let aiOpen = false;
let aiTaskData = null;
let dotsOpen = false;
let selectedColor = CARD_COLORS[0].value;
let editSelectedColor = CARD_COLORS[0].value;
let currentUser = localStorage.getItem("userName") || "";
if (!currentUser) {
  const modal = document.getElementById("loginModal");
  if (modal) modal.style.display = "flex";
}


function getDaysLeft(due) {
  const now = new Date();
  const todayStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  const today = new Date(todayStr + 'T00:00:00');
  const d = new Date(due + 'T00:00:00');
  return Math.round((d - today) / 86400000);
}

function urgency(days) {
  if (days < 0)   return { label:"Vencida",    color:"#ff3b3b", bg:"#ffe5e5" };
  if (days === 0) return { label:"Hoy",        color:"#ff8c00", bg:"#fff3e0" };
  if (days <= 2)  return { label:"Urgente",    color:"#e07b00", bg:"#fff3e0" };
  if (days <= 5)  return { label:"Pronto",     color:"#2e7d32", bg:"#e8f5e9" };
  return               { label:"Con tiempo", color:"#7c4dcc", bg:"#ede7f6" };
}

function fmtDate(str) {
  if (!str) return "-";
  const parts = str.split("-");
  return parts[2] + "/" + parts[1] + "/" + parts[0];
}

function esc(str) {
  return String(str||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function sorted() {
  return [...tasks].sort(function(a,b){ return getDaysLeft(b.due) - getDaysLeft(a.due); });
}

function buildMessage() {
  const list = sorted();
  if (!list.length) return "No hay tareas esta semana.";
  const now = new Date();
  const todayFmt = String(now.getDate()).padStart(2,'0') + "/" + String(now.getMonth()+1).padStart(2,'0') + "/" + now.getFullYear();
  let lines = ["Tareas de la semana", "Actualizado: " + todayFmt, "-------------------------"];
  list.forEach(function(t, i) {
    const days = getDaysLeft(t.due);
    const badge = days < 0 ? "VENCIDA" : days === 0 ? "HOY" : days <= 2 ? "URGENTE" : days <= 5 ? "PRONTO" : "CON TIEMPO";
    // Strip HTML tags for plain text message
    const plainDesc = (t.desc||"").replace(/<[^>]+>/g, "");
    lines.push("\n" + (i+1) + ". " + t.title + " [" + badge + "]");
    if (plainDesc) lines.push("   " + plainDesc);
    if (t.assigned) lines.push("   Dejada: " + fmtDate(t.assigned));
    lines.push("   Entrega: " + fmtDate(t.due) + " (" + (days >= 0 ? days + " dia" + (days!==1?"s":"") : "vencida") + ")");
  });
  lines.push("\n-------------------------");
  return lines.join("\n");
}

function doCopy() {
  const text = buildMessage();
  function fallback() {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.cssText = "position:fixed;opacity:0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    try { document.execCommand("copy"); showCopyOk(); } catch(e) { alert("Copia el texto manualmente."); }
    document.body.removeChild(ta);
  }
  if (navigator.clipboard) { navigator.clipboard.writeText(text).then(showCopyOk).catch(fallback); }
  else fallback();
}

function showCopyOk() {
  const el = document.getElementById("copyItem");
  if (!el) return;
  el.textContent = "Copiado!";
  el.classList.add("ok");
  setTimeout(function() {
    el.textContent = "Copiar mensaje para WhatsApp";
    el.classList.remove("ok");
    dotsOpen = false;
    const m = document.getElementById("dotsMenu");
    if (m) m.classList.remove("open");
  }, 2000);
}

function colorPickerHTML(selectedVal, prefix) {
  let html = '<div class="color-picker-row">';
  CARD_COLORS.forEach(function(c) {
    html += '<div class="card-color-opt ' + (selectedVal === c.value ? "selected" : "") + '" style="background:' + c.value + '" title="' + c.label + '" onclick="doSelectColor(\'' + c.value + '\',\'' + prefix + '\')"></div>';
  });
  html += '</div>';
  return html;
}

function toolbarHTML(targetId) {
  return '<div class="toolbar">' +
    '<button class="tb-btn" onclick="doFormat(\'bold\',\'' + targetId + '\')"><b>N</b></button>' +
    '<button class="tb-btn" onclick="doFormat(\'italic\',\'' + targetId + '\')"><i>C</i></button>' +
    '<button class="tb-btn" onclick="doFormat(\'underline\',\'' + targetId + '\')"><u>S</u></button>' +
    '<span style="color:var(--muted);font-size:11px">Color:</span>' +
    '<button class="tb-btn" style="background:#e53935;color:#fff;border-color:#e53935" onclick="doColor(\'#e53935\',\'' + targetId + '\')">A</button>' +
    '<button class="tb-btn" style="background:#1565c0;color:#fff;border-color:#1565c0" onclick="doColor(\'#1565c0\',\'' + targetId + '\')">A</button>' +
    '<button class="tb-btn" style="background:#2e7d32;color:#fff;border-color:#2e7d32" onclick="doColor(\'#2e7d32\',\'' + targetId + '\')">A</button>' +
    '<button class="tb-btn" style="background:#e07b00;color:#fff;border-color:#e07b00" onclick="doColor(\'#e07b00\',\'' + targetId + '\')">A</button>' +
    '<button class="tb-btn" onclick="doColor(\'#2a1f3d\',\'' + targetId + '\')">A</button>' +
    '</div>';
}

currentUser = localStorage.getItem("userName") || "";

function render() {
  const modal = document.getElementById("loginModal");
  if (!currentUser) {
    if (modal) modal.style.display = "flex";
    return;
  }
  if (modal) modal.style.display = "none";
  const list = sorted();
  const today = new Date().toISOString().split("T")[0];
  const urgent = tasks.filter(function(t){ return getDaysLeft(t.due) <= 2 && getDaysLeft(t.due) >= 0; }).length;
  const overdue = tasks.filter(function(t){ return getDaysLeft(t.due) < 0; }).length;

  let taskHTML = "";
  list.forEach(function(t, i) {
    if (editingId === t.id) {
      editSelectedColor = t.cardColor || CARD_COLORS[0].value;
      taskHTML += '<div class="edit-card">' +
        '<div class="edit-label">EDITANDO TAREA</div>' +
        '<div class="form-grid">' +
        '<div class="field"><label>Nombre</label><input id="eTitle" class="inp" value="' + esc(t.title) + '" /></div>' +
        '<div class="field"><label>Descripcion</label>' + toolbarHTML("eDesc") + '<div id="eDesc" class="rich-area" contenteditable="true">' + (t.desc||"") + '</div></div>' +
        '<div class="form-row">' +
        '<div class="field"><label>Fecha dejada</label><input id="eAssigned" type="date" class="inp" value="' + (t.assigned||"") + '" /></div>' +
        '<div class="field"><label>Fecha entrega</label><input id="eDue" type="date" class="inp" value="' + (t.due||"") + '" /></div>' +
        '</div>' +
        '<div class="field"><label>Color de la tarjeta</label>' + colorPickerHTML(editSelectedColor, "edit") + '</div>' +
        '<div class="btn-row">' +
        '<button class="btn btn-warn" style="flex:1" onclick="doSaveEdit(\'' + t.id + '\')">Guardar</button>' +
        '<button class="btn btn-secondary" onclick="doCancelEdit()">Cancelar</button>' +
        '</div></div></div>';
      return;
    }
    const days = getDaysLeft(t.due);
    const u = urgency(days);
    const daysText = days < 0 ? "Vencida" : days === 0 ? "Hoy" : days + "d restantes";
    const borderColor = t.cardColor || "#d8cff0";
    taskHTML += '<div class="task-card" style="background:' + borderColor + ';border-color:' + borderColor + '">' +
      (adminUnlocked ? '<div class="card-actions"><button class="icon-btn edit" onclick="doStartEdit(\'' + t.id + '\')">✏</button><button class="icon-btn del" onclick="doDelete(\'' + t.id + '\')">✕</button></div>' : '') +
      '<div class="card-num">TAREA #' + String(i+1).padStart(2,"0")  +
      '<div style="display:flex;align-items:center;justify-content:space-between;width:14%">' +
        '<span class="badge" style="background:' + u.bg + ';color:' + u.color + 'margin-left:8px;">' + u.label + '</span>'  +
        '<span onclick="doToggleDone(\'' + t.id + '\',\'' + t.done + '\')" style="cursor:poiner;font-size: 18px;margin-top:-10px;">' + (t.done ? '✅' : '⬜') + '</span>' + '</div></div>' +
      '<div class="card-title" style="' + (t.done ? 'text-decoration:line-through;opacity:0.5' : '') + '">' + esc(t.title) + '</div>' +
      (t.desc ? '<div class="card-desc">' + t.desc + '</div>' : '') +
      '<div class="card-meta">' +
      (t.assigned ? '<span>📆 ' + fmtDate(t.assigned) + '</span>' : '') +
      '<span>⏰ ' + fmtDate(t.due) + '</span>' +
      '<span class="days-left" style="color:' + u.color + '">' + daysText + '</span>' +
      '</div></div>';
  });

  let adminHTML = "";
  if (adminUnlocked) {
    adminHTML =
      '<button class="admin-toggle" onclick="doToggleAi()">✨ Agregar con IA</button>' +
      '<div class="panel ' + (aiOpen?"open":"") + '" id="aiPanel">' +
        '<div class="panel-label">DESCRIBE LA TAREA EN TUS PALABRAS</div>' +
        '<div class="form-grid">' +
          '<div class="field"><label>Escribe la tarea</label><textarea id="aiInput" class="inp" rows="3" placeholder="Ej: Expo de lenguaje el viernes, noticiero dramatizando un poema"></textarea></div>' +
          '<div id="aiResultBox" style="display:none">' +
            '<div class="ai-preview" id="aiPreview"></div>' +
            '<div class="btn-row">' +
              '<button class="btn btn-primary" style="flex:1" onclick="doConfirmAi()">Guardar tarea</button>' +
              '<button class="btn btn-secondary" onclick="doResetAi()">Editar</button>' +
            '</div>' +
          '</div>' +
          '<div id="aiLoadBox" style="display:none;text-align:center;padding:12px;color:var(--accent)"><div class="spinner" style="margin:0 auto 8px"></div>Interpretando...</div>' +
          '<div id="aiErrBox" style="display:none;color:var(--danger);font-size:12px"></div>' +
          '<div class="btn-row" id="aiSubmitRow">' +
            '<button class="btn btn-primary" style="flex:1" onclick="doSendAi()">Interpretar</button>' +
            '<button class="btn btn-secondary" onclick="doToggleAi()">Cancelar</button>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<button class="admin-toggle" onclick="doToggleAdd()">+ Agregar tarea manualmente</button>' +
      '<div class="panel ' + (addOpen?"open":"") + '" id="addPanel">' +
        '<div class="panel-label">+ NUEVA TAREA</div>' +
        '<div class="form-grid">' +
          '<div class="field"><label>Nombre</label><input id="nTitle" class="inp" placeholder="Nombre de la tarea" /></div>' +
          '<div class="field"><label>Descripcion</label>' + toolbarHTML("nDesc") + '<div id="nDesc" class="rich-area" contenteditable="true" placeholder="Descripcion (opcional)"></div></div>' +
          '<div class="form-row">' +
            '<div class="field"><label>Fecha dejada</label><input id="nAssigned" type="date" class="inp" value="' + today + '" /></div>' +
            '<div class="field"><label>Fecha entrega</label><input id="nDue" type="date" class="inp" /></div>' +
          '</div>' +
          '<div class="field"><label>Color de la tarjeta</label>' + colorPickerHTML(selectedColor, "add") + '</div>' +
          '<div class="btn-row">' +
            '<button class="btn btn-primary" style="flex:1" onclick="doAddTask()">Guardar tarea</button>' +
            '<button class="btn btn-secondary" onclick="doToggleAdd()">Cancelar</button>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<button class="btn btn-secondary btn-full" style="margin-bottom:12px;font-size:12px" onclick="doLock()">Cerrar sesion admin</button>';
  } else {
    adminHTML =
      '<button class="admin-toggle" onclick="doToggleLogin()">Acceso administrador</button>' +
      '<div class="panel ' + (loginOpen?"open":"") + '" id="loginPanel">' +
        '<div class="panel-label">CONTRASENA</div>' +
        '<div class="pin-wrap"><input type="password" id="pinInput" class="inp" placeholder="Contrasena" onkeydown="if(event.key===\'Enter\')doLogin()" /><button class="btn btn-primary" onclick="doLogin()">Entrar</button></div>' +
        '<div id="pinErr" style="display:none;color:var(--danger);font-size:12px">Contrasena incorrecta</div>' +
      '</div>';
  }

  document.getElementById("app").innerHTML =
    '<div class="wrap">' +
      '<div class="header">' +
        '<div class="header-top">' +
          '<span class="label">Grupo Escolar</span>' +
          '<div class="dots-wrap">' +
            '<span class="live">● En vivo</span>' +
            '<button class="dots-btn" id="dotsBtn" onclick="doToggleDots()">···</button>' +
            '<div class="dots-menu" id="dotsMenu">' +
              '<div class="dots-item" id="copyItem" onclick="doCopy()">📋 Copiar para WhatsApp</div>' +
              '<div class="dots-item" onclick="window.doLogout()">Cerrar seción</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<h1>Tareas<br>de la semana</h1>' +
        '<p class="subtitle">Ordenadas de mayor a menor margen de tiempo</p>' +
      '</div>' +
      '<div class="stats">' +
        '<div class="stat"><strong>' + tasks.length + '</strong> total</div>' +
        (urgent ? '<div class="stat"><strong style="color:var(--warn)">' + urgent + '</strong> urgente' + (urgent!==1?"s":"") + '</div>' : '') +
        (overdue ? '<div class="stat"><strong style="color:var(--danger)">' + overdue + '</strong> vencida' + (overdue!==1?"s":"") + '</div>' : '') +
      '</div>' +
      (list.length === 0 ? '<div class="empty"><div class="empty-icon">📭</div>SIN TAREAS ESTA SEMANA</div>' : taskHTML) +
      adminHTML +
    '</div>';
}

// Format actions
window.doFormat = function(cmd, targetId) {
  const el = document.getElementById(targetId);
  if (!el) return;
  el.focus();
  document.execCommand(cmd, false, null);
};
window.doColor = function(color, targetId) {
  const el = document.getElementById(targetId);
  if (!el) return;
  el.focus();
  document.execCommand('foreColor', false, color);
};
window.doSelectColor = function(color, prefix) {
  if (prefix === "add") selectedColor = color;
  else editSelectedColor = color;
  document.querySelectorAll(".card-color-opt").forEach(function(el) {
    el.classList.remove("selected");
    if (el.style.background === color || el.style.backgroundColor === color) el.classList.add("selected");
  });
};

// Dots
window.doToggleDots = function() {
  dotsOpen = !dotsOpen;
  const m = document.getElementById("dotsMenu");
  if (m) m.classList.toggle("open", dotsOpen);
};
document.addEventListener("click", function(e) {
  if (!e.target.closest("#dotsBtn") && !e.target.closest("#dotsMenu")) {
    dotsOpen = false;
    const m = document.getElementById("dotsMenu");
    if (m) m.classList.remove("open");
  }
});

// Admin
window.doToggleLogin = function() { loginOpen = !loginOpen; render(); if (loginOpen) setTimeout(function(){ const p = document.getElementById("pinInput"); if(p) p.focus(); },100); };
window.doLogin = function() {
  const inp = document.getElementById("pinInput");
  if (inp && inp.value === ADMIN_PIN) { adminUnlocked = true; loginOpen = false; render(); }
  else { const e = document.getElementById("pinErr"); if(e) e.style.display = "block"; }
};
window.doLock = function() { adminUnlocked = false; addOpen = false; aiOpen = false; render(); };

// Add panel - toggle without full re-render to avoid losing typed text
window.doToggleAdd = function() {
  addOpen = !addOpen;
  const panel = document.getElementById("addPanel");
  if (panel) { panel.classList.toggle("open", addOpen); }
  else render();
  if (addOpen) setTimeout(function(){ const t = document.getElementById("nTitle"); if(t) t.focus(); },100);
};

// AI panel - toggle without full re-render
window.doToggleAi = function() {
  aiOpen = !aiOpen;
  aiTaskData = null;
  const panel = document.getElementById("aiPanel");
  if (panel) { panel.classList.toggle("open", aiOpen); }
  else render();
  if (aiOpen) setTimeout(function(){ const t = document.getElementById("aiInput"); if(t) t.focus(); },100);
};

window.doAddTask = async function() {
  const titleEl = document.getElementById("nTitle");
  const descEl = document.getElementById("nDesc");
  const assignedEl = document.getElementById("nAssigned");
  const dueEl = document.getElementById("nDue");
  const title = titleEl && titleEl.value.trim();
  const desc = descEl && descEl.innerHTML.trim();
  const assigned = assignedEl && assignedEl.value;
  const due = dueEl && dueEl.value;
  if (!title || !due) { alert("Nombre y fecha de entrega son obligatorios."); return; }
  await addDoc(collection(db, "tareas"), { title: title, desc: desc||"", assigned: assigned||"", due: due, cardColor: selectedColor, done: false, createdAt: serverTimestamp() });
  addOpen = false;
  selectedColor = CARD_COLORS[0].value;
};

window.doStartEdit = function(id) { editingId = id; render(); };
window.doCancelEdit = function() { editingId = null; render(); };
window.doSaveEdit = async function(id) {
  const titleEl = document.getElementById("eTitle");
  const descEl = document.getElementById("eDesc");
  const assignedEl = document.getElementById("eAssigned");
  const dueEl = document.getElementById("eDue");
  const title = titleEl && titleEl.value.trim();
  const desc = descEl && descEl.innerHTML.trim();
  const assigned = assignedEl && assignedEl.value;
  const due = dueEl && dueEl.value;
  if (!title || !due) { alert("Nombre y fecha son obligatorios."); return; }
  await updateDoc(doc(db, "tareas", id), { title: title, desc: desc||"", assigned: assigned||"", due: due, cardColor: editSelectedColor });
  editingId = null;
};
window.doDelete = async function(id) {
  if (!confirm("Eliminar esta tarea?")) return;
  await deleteDoc(doc(db, "tareas", id));
  if (editingId === id) editingId = null;
};

window.doToggleDone = async function(id, currentDone) {
  const newDone = currentDone === "true" ? false : true;
  await updateDoc(doc(db, "tareas", id), {done: newDone});
};

window.doLogout = function() {
  localStorage.removeItem("userName");
  currentUser = "";
  dotsOpen = false;
  location.reload();
}
window.doLoginName = function() {
  const input = document.getElementById("loginInput");
  const nombre = input ? input.value.trim() : "";
  if (!nombre) {
    if (input) input.style.border = "2px solid red";
    return;
  }
  currentUser = nombre;
  localStorage.setItem("userName", currentUser);
  const modal = document.getElementById("loginModal");
  if (modal) modal.style.display = "none";
  render();
};

// AI
window.doSendAi = async function() {
  const inputEl = document.getElementById("aiInput");
  const input = inputEl && inputEl.value.trim();
  if (!input) return;
  const loadBox = document.getElementById("aiLoadBox");
  const submitRow = document.getElementById("aiSubmitRow");
  const errBox = document.getElementById("aiErrBox");
  const resultBox = document.getElementById("aiResultBox");
  if (loadBox) loadBox.style.display = "block";
  if (submitRow) submitRow.style.display = "none";
  if (errBox) errBox.style.display = "none";
  if (resultBox) resultBox.style.display = "none";
  const now = new Date();
  const todayStr = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,"0") + "-" + String(now.getDate()).padStart(2,"0");
  const dayName = now.toLocaleDateString("es-SV", { weekday:"long" });
  try {
    const prompt = "Eres un asistente que extrae datos de tareas escolares. Hoy es " + dayName + " " + todayStr + ". El usuario describe una tarea en lenguaje natural. Extrae: title (nombre corto max 60 chars), desc (descripcion breve), assigned (hoy en YYYY-MM-DD), due (fecha entrega en YYYY-MM-DD, infiere el dia mas proximo si dice viernes, domingo, etc). Responde SOLO con JSON valido sin markdown. Ejemplo: {\"title\":\"Expo lenguaje\",\"desc\":\"Noticiero dramatizando un poema\",\"assigned\":\"2026-04-25\",\"due\":\"2026-05-02\"}. Tarea: " + input;
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + ["gsk_PGBEBbnUWexSHH4S","nwe2WGdyb3FYVpMD7xll7eH9ENZOZQgbP3p8"].join("") },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [{ role: "user", content: prompt }],
        max_tokens: 200
      })
    });
    if (!res.ok) {
      const errData = await res.json().catch(function(){ return {}; });
      throw new Error("HTTP " + res.status + " - " + (errData.error && errData.error.message ? errData.error.message : "Error desconocido"));
    }
    const data = await res.json();
    const text = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || "";
    if (!text) throw new Error("Respuesta vacia");
    const cleanText = text.replace(/```json|```/g, "").trim();
    const jsonMatch = cleanText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error("Sin JSON: " + cleanText.substring(0, 80));
    aiTaskData = JSON.parse(jsonMatch[0]);
    const preview = document.getElementById("aiPreview");
    if (preview) {
      preview.innerHTML = "<b>" + esc(aiTaskData.title) + "</b><br>" +
        "<span style='color:var(--muted)'>" + esc(aiTaskData.desc) + "</span><br><br>" +
        "Dejada: " + fmtDate(aiTaskData.assigned) + "  Entrega: " + fmtDate(aiTaskData.due);
    }
    if (loadBox) loadBox.style.display = "none";
    if (resultBox) resultBox.style.display = "block";
  } catch(e) {
    if (loadBox) loadBox.style.display = "none";
    if (submitRow) submitRow.style.display = "flex";
    if (errBox) { errBox.style.display = "block"; errBox.textContent = "Error: " + (e && e.message ? e.message : "Intenta de nuevo"); }
  }
};

window.doResetAi = function() {
  aiTaskData = null;
  const resultBox = document.getElementById("aiResultBox");
  const submitRow = document.getElementById("aiSubmitRow");
  const input = document.getElementById("aiInput");
  if (resultBox) resultBox.style.display = "none";
  if (submitRow) submitRow.style.display = "flex";
  if (input) { input.value = ""; input.focus(); }
};

window.doConfirmAi = async function() {
  if (!aiTaskData) return;
  await addDoc(collection(db, "tareas"), { title: aiTaskData.title, desc: aiTaskData.desc||"", assigned: aiTaskData.assigned||"", due: aiTaskData.due, cardColor: CARD_COLORS[0].value, done:false, createdAt: serverTimestamp() });
  aiTaskData = null;
  aiOpen = false;
  const panel = document.getElementById("aiPanel");
  if (panel) panel.classList.remove("open");
};

// Realtime
const q = query(collection(db, "tareas"), orderBy("createdAt", "asc"));
onSnapshot(q, function(snap) {
  tasks = snap.docs.map(function(d){ return Object.assign({ id: d.id }, d.data()); });
  render();
});

function scheduleRefresh() {
  const now = new Date();
  const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1, 0, 0, 10);
  setTimeout(function(){ render(); scheduleRefresh(); }, midnight - now);
}
scheduleRefresh();
setInterval(function(){ render(); }, 60000);
</script>
